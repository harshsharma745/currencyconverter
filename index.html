<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💱 Currency Exchange System</h1>
            <p>Object-Oriented Programming Project | B.Tech 3rd Semester</p>
        </div>

        <div class="content">
            <div class="exchange-form">
                <div class="form-group">
                    <label for="amount">Amount to Convert</label>
                    <input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01" value="100">
                </div>

                <div class="currency-row">
                    <div class="form-group">
                        <label for="fromCurrency">From Currency</label>
                        <select id="fromCurrency">
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="INR" selected>INR - Indian Rupee</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="toCurrency">To Currency</label>
                        <select id="toCurrency">
                            <option value="USD" selected>USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="INR">INR - Indian Rupee</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                        </select>
                    </div>
                </div>

                <button class="btn" onclick="performExchange()">Convert Currency</button>
            </div>

            <div id="result" class="result hidden">
                <h3>Conversion Result</h3>
                <div class="result-value" id="resultValue"></div>
                <div class="result-details" id="resultDetails"></div>
            </div>

            <div class="history">
                <h3>Recent Transactions</h3>
                <div id="historyList"></div>
            </div>

            <div class="rates-table">
                <h3>Current Exchange Rates (Base: USD)</h3>
                <table id="ratesTable"></table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
